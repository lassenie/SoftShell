name: PR validation

# Build and run the unit tests on every pull request to master.
# This is a separate workflow from "Tests" so that pull request runs do not
# affect the unit-test status badge in the README (that badge reflects master).

on:
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test SoftShell.sln --configuration Release --blame-hang-timeout 5m
