name: Publish NuGet packages

# Run this manually from the Actions tab. It only runs on demand (never on push).
# It operates on whatever ref you launch it from, so launch it from the main branch
# (master). The workflow:
#   1. Computes a repo-wide version with GitVersion.
#   2. Builds and packs both NuGet packages (SoftShell and SoftShell.Ssh) at that version.
#   3. Pushes both packages to NuGet.org.
#   4. Tags the commit as softshell/<major>/<minor>/<major.minor.patch>.
#   5. Creates a GitHub release for that tag, marked as the latest release.
#
# Inputs let you choose whether this release bumps the minor or patch version, and
# whether to deploy (publish to NuGet.org + tag) or just do a build-only dry run.
# A dry run still uploads the packed .nupkg as an artifact.
#
# Publishing uses NuGet.org Trusted Publishing (OIDC) — no long-lived API key is
# stored. It requires:
#   * A Trusted Publishing policy on nuget.org for this repo (owner: lassenie,
#     repository: SoftShell, workflow file: publish-nuget.yml).
#   * A repository variable named NUGET_USER holding your nuget.org username
#     (profile name, not your email). It's public info, so a variable, not a secret.
# At publish time the NuGet/login action exchanges a GitHub OIDC token for a
# short-lived (1 hour) NuGet API key.

on:
  workflow_dispatch:
    inputs:
      increment:
        description: Version part to increment for this release
        type: choice
        required: true
        default: Minor
        options:
          - Minor
          - Patch
      deploy:
        description: Publish the packages to NuGet.org and tag the release
        type: boolean
        default: true
      softshell_release_notes:
        description: Release notes for the SoftShell package
        type: string
        required: true
      softshell_ssh_release_notes:
        description: Release notes for the SoftShell.Ssh package
        type: string
        required: true

permissions:
  contents: write   # needed to push the release tag
  id-token: write   # needed to request the OIDC token for NuGet trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only the repository owner may run this workflow. If anyone else triggers it
    # the job is skipped, so the trusted-publishing login and the publish/tag steps
    # below are never reached.
    if: ${{ github.actor == github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0      # GitVersion needs full history
          fetch-tags: true    # ...and existing release tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Select version increment
        env:
          INCREMENT: ${{ github.event.inputs.increment || 'Minor' }}
        run: |
          echo "Incrementing: $INCREMENT"
          sed -i "s/increment: Minor/increment: $INCREMENT/" GitVersion.yml

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: '5.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1

      - name: Show version
        run: |
          echo "Version: ${{ steps.gitversion.outputs.majorMinorPatch }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"

      # Gate the release on the unit tests. If this step fails the job stops here,
      # so the pack/publish/tag steps below never run for a broken build.
      - name: Test
        run: dotnet test SoftShell.sln --configuration Release --blame-hang-timeout 5m

      - name: Pack packages
        env:
          VERSION: ${{ steps.gitversion.outputs.majorMinorPatch }}
          FULLSEMVER: ${{ steps.gitversion.outputs.fullSemVer }}
          SOFTSHELL_NOTES: ${{ github.event.inputs.softshell_release_notes }}
          SOFTSHELL_SSH_NOTES: ${{ github.event.inputs.softshell_ssh_release_notes }}
        run: |
          pack() {
            local proj="$1"
            local notes="$2"
            dotnet pack "$proj" \
              --configuration Release \
              --output ./artifacts \
              -p:Version="$VERSION" \
              -p:AssemblyVersion="$VERSION.0" \
              -p:FileVersion="$VERSION.0" \
              -p:InformationalVersion="$FULLSEMVER" \
              -p:PackageReleaseNotes="$notes"
          }
          pack src/SoftShell/SoftShell.csproj "$SOFTSHELL_NOTES"
          pack src/SoftShell.Ssh/SoftShell.Ssh.csproj "$SOFTSHELL_SSH_NOTES"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: nupkg
          path: ./artifacts/*.nupkg

      # Exchange a GitHub OIDC token for a short-lived NuGet API key. Done right
      # before the push because the key is only valid for 1 hour.
      - name: NuGet login (trusted publishing)
        id: nuget_login
        if: ${{ github.event.inputs.deploy == 'true' }}
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet.org
        if: ${{ github.event.inputs.deploy == 'true' }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Tag release
        id: tag
        if: ${{ github.event.inputs.deploy == 'true' }}
        env:
          MAJOR: ${{ steps.gitversion.outputs.major }}
          MINOR: ${{ steps.gitversion.outputs.minor }}
          MMP: ${{ steps.gitversion.outputs.majorMinorPatch }}
        run: |
          TAG="softshell/${MAJOR}/${MINOR}/${MMP}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, nothing to do."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $MMP"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Create (or update) a GitHub release for the tag and mark it as the latest
      # release. Uses the GitHub CLI, which is preinstalled on the runner.
      - name: Create GitHub release
        if: ${{ github.event.inputs.deploy == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          MMP: ${{ steps.gitversion.outputs.majorMinorPatch }}
          SOFTSHELL_NOTES: ${{ github.event.inputs.softshell_release_notes }}
          SOFTSHELL_SSH_NOTES: ${{ github.event.inputs.softshell_ssh_release_notes }}
        run: |
          NOTES=$(cat <<EOF
          ## SoftShell

          $SOFTSHELL_NOTES

          ## SoftShell.Ssh

          $SOFTSHELL_SSH_NOTES
          EOF
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating it."
            gh release edit "$TAG" \
              --title "SoftShell $MMP" \
              --notes "$NOTES" \
              --latest \
              --draft=false
          else
            gh release create "$TAG" \
              --title "SoftShell $MMP" \
              --notes "$NOTES" \
              --latest \
              --verify-tag
          fi
          echo "Release $TAG marked as latest."
