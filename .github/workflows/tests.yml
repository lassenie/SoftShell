name: Tests

# Build and run the unit tests on every push and pull request to master.
# This is what the unit-test status badge in the README reflects.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test SoftShell.sln --configuration Release --blame-hang-timeout 5m
